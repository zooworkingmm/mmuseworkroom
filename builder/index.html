<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Builder</title>
<link rel="stylesheet" href="style.css?v=12" />
</head>
<body>

<div class="b-layout">

  <!-- LEFT : project list -->
  <aside class="b-side">
    <div class="b-side-inner">
      <header class="b-side-head">
        <h1 class="b-title">PORTFOLIO BUILDER</h1>
        <p class="b-sub">폴더의 사진으로 상세 페이지를 만듭니다</p>
      </header>

      <div class="b-tabs">
        <button type="button" class="b-tab active" id="tabBtnProjects" data-tab="projects">프로젝트</button>
        <button type="button" class="b-tab" id="tabBtnIntro" data-tab="intro">소개</button>
      </div>

      <div class="b-tab-panel" id="tabProjects">
        <button type="button" class="b-btn b-btn-new" id="btnNewProject">+ 새 프로젝트</button>

        <nav class="b-projects" id="projectList"></nav>

        <div class="b-pending" id="pendingSection" hidden>
          <p class="b-pending-title">새 폴더 발견</p>
          <div class="b-pending-list" id="pendingList"></div>
        </div>
      </div>

      <div class="b-tab-panel" id="tabIntro" hidden>
        <div class="b-field">
          <label>스튜디오명</label>
          <input type="text" id="s-name" />
        </div>
        <div class="b-field">
          <label>역할</label>
          <input type="text" id="s-role" />
        </div>
        <div class="b-field">
          <label>주소</label>
          <input type="text" id="s-address" />
        </div>
        <div class="b-field">
          <label>전화번호</label>
          <input type="text" id="s-phone" />
        </div>
        <div class="b-field">
          <label>이메일</label>
          <input type="text" id="s-email" />
        </div>
        <div class="b-field">
          <label>웹사이트</label>
          <input type="text" id="s-site" />
        </div>
        <div class="b-field">
          <label>SNS</label>
          <input type="text" id="s-sns" />
        </div>
      </div>

      <div class="b-side-foot">
        <p class="b-status" id="publishStatus"></p>
      </div>
    </div>
  </aside>

  <!-- CENTER : editor -->
  <main class="b-editor" id="editor">
    <p class="b-empty">왼쪽에서 프로젝트를 선택하거나, "+ 새 프로젝트"로 시작하세요.</p>
  </main>

  <!-- RIGHT : live preview -->
  <aside class="b-preview">
    <div class="b-preview-head">
      <span>LIVE PREVIEW</span>
      <div class="b-preview-modes">
        <button type="button" class="mode-btn active" id="modeDesktop" data-mode="desktop">Desktop</button>
        <button type="button" class="mode-btn" id="modeMobile" data-mode="mobile">Mobile</button>
      </div>
    </div>
    <div class="b-preview-scroll">
      <div class="b-preview-frame" id="previewFrame"></div>
    </div>
  </aside>

</div>

<input type="file" id="fileInput" accept="image/*" multiple hidden />
<input type="file" id="folderInput" webkitdirectory directory multiple hidden />

<!-- Generate modal -->
<div class="gen-overlay" id="genOverlay" hidden>
  <div class="gen-modal">
    <div class="gen-head">
      <div>
        <h2>Generate</h2>
        <p class="gen-sub" id="genSub">PROJECT NAME</p>
      </div>
      <button type="button" class="gen-close" id="genClose">×</button>
    </div>

    <div class="gen-body">
      <div class="gen-section">
        <p class="gen-label">TONE REFERENCE <span>톤 레퍼런스</span></p>
        <div class="gen-pills" data-group="tone" id="genTonePills">
          <button type="button" class="gen-pill active" data-value="standard">Standard<span>스탠다드</span></button>
          <button type="button" class="gen-pill" data-value="side">Side (잡담)<span>사이드</span></button>
          <button type="button" class="gen-pill gen-pill-add" id="genToneAdd" title="현재 설정을 새 톤으로 저장">+</button>
        </div>
      </div>

      <div class="gen-section">
        <p class="gen-label">GENERATE TARGET <span>생성 대상</span></p>
        <div class="gen-pills" data-group="target" data-multi="1">
          <button type="button" class="gen-pill active" data-value="body">본문</button>
          <button type="button" class="gen-pill active" data-value="hidden">히든박스</button>
        </div>
      </div>

      <div class="gen-section">
        <p class="gen-label">VOICE <span>어투</span></p>
        <div class="gen-pills" data-group="voice">
          <button type="button" class="gen-pill active" data-value="auto">Auto<span>자동</span></button>
          <button type="button" class="gen-pill" data-value="observer">1st observer<span>관찰자</span></button>
          <button type="button" class="gen-pill" data-value="third">3rd person<span>3인칭</span></button>
          <button type="button" class="gen-pill" data-value="essay">Essay<span>에세이</span></button>
          <button type="button" class="gen-pill" data-value="interview">Interview<span>인터뷰</span></button>
        </div>
      </div>

      <div class="gen-section">
        <p class="gen-label">LENGTH <span>길이</span></p>
        <div class="gen-pills" data-group="length">
          <button type="button" class="gen-pill" data-value="short">Short<span>짧게</span></button>
          <button type="button" class="gen-pill active" data-value="medium">Medium<span>중간</span></button>
          <button type="button" class="gen-pill" data-value="long">Long<span>길게</span></button>
        </div>
      </div>

      <div class="gen-section">
        <p class="gen-label">STRUCTURE <span>구조</span></p>
        <div class="gen-pills" data-group="structure">
          <button type="button" class="gen-pill active" data-value="three-acts">Three acts<span>3막</span></button>
          <button type="button" class="gen-pill" data-value="vignettes">Vignettes<span>비네트</span></button>
          <button type="button" class="gen-pill" data-value="single-scene">Single scene<span>단일 장면</span></button>
        </div>
      </div>

      <div class="gen-section">
        <p class="gen-label">PHOTO FLOW <span>사진 흐름</span></p>
        <div class="gen-pills" data-group="photoFlow">
          <button type="button" class="gen-pill active" data-value="as-arranged">As arranged<span>설정 순</span></button>
          <button type="button" class="gen-pill" data-value="match-writing">Match writing<span>글에 맞춤</span></button>
          <button type="button" class="gen-pill" data-value="chronological">Chronological<span>시간순</span></button>
          <button type="button" class="gen-pill" data-value="detail-wide">Detail → wide<span>디테일→와이드</span></button>
          <button type="button" class="gen-pill" data-value="wide-detail">Wide → detail<span>와이드→디테일</span></button>
        </div>
      </div>

      <div class="gen-section">
        <label class="gen-label" for="genEmphasis">EMPHASIS <span>강조</span></label>
        <textarea id="genEmphasis" rows="3" placeholder="강조하고 싶은 내용을 적어주세요"></textarea>
      </div>

      <div class="gen-section">
        <label class="gen-label" for="genToneNotes">TONE NOTES <span>추가 톤 메모</span></label>
        <textarea id="genToneNotes" rows="2" placeholder="자유 텍스트로 어조 보강"></textarea>
      </div>
    </div>

    <div class="gen-foot">
      <button type="button" class="b-btn" id="genCancel">Cancel</button>
      <button type="button" class="b-btn b-btn-generate" id="genSubmit">Generate</button>
    </div>
  </div>
</div>

<script src="../assets/data.js?v=12"></script>
<script src="app.js?v=12"></script>
</body>
</html>
